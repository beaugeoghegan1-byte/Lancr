<!-- jobs/partials/message.html -->
{% if message.sender == request.user %}
  <div class="flex justify-end">
    <div class="bg-teal-700 text-white text-sm px-4 py-2 rounded-2xl rounded-br-sm max-w-xs">
      {{ message.content }}
      <div class="text-xs text-teal-300 mt-1 text-right">{{ message.created_at|date:"H:i" }}</div>
    </div>
  </div>
{% else %}
  <div class="flex justify-start">
    <div class="bg-gray-700 text-white text-sm px-4 py-2 rounded-2xl rounded-bl-sm max-w-xs">
      <div class="text-xs text-gray-400 mb-1">{{ message.sender.username }}</div>
      {{ message.content }}
      <div class="text-xs text-gray-500 mt-1">{{ message.created_at|date:"H:i" }}</div>
    </div>
  </div>
{% endif %}
