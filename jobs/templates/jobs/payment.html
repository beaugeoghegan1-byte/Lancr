{% extends "base.html" %}

{% block title %}Pay | {{ job.title }}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-12 px-6">

  <a href="{% url 'job_applications' job.id %}" class="text-gray-500 hover:text-teal-400 text-sm mb-6 inline-block">
    ← Back
  </a>

  <h1 class="text-2xl font-bold text-white mb-2">Pay for {{ job.title }}</h1>
  <p class="text-gray-400 text-sm mb-8">
    Amount: <span class="text-white font-semibold">{{ job.currency }} {{ amount }}</span>
  </p>

  <div class="bg-card border border-subtle rounded-2xl p-6">
    <div id="payment-element" class="mb-6"></div>
    <button id="submit-btn" class="btn-primary w-full text-center py-3">
      Pay Now
    </button>
    <div id="payment-message" class="text-red-400 text-sm mt-3 hidden"></div>
  </div>

</div>

<script src="https://js.stripe.com/v3/"></script>
<script>
  const stripe = Stripe('{{ stripe_public_key }}');
  const elements = stripe.elements({ clientSecret: '{{ client_secret }}' });
  const paymentElement = elements.create('payment');
  paymentElement.mount('#payment-element');

  document.getElementById('submit-btn').addEventListener('click', async () => {
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Processing...';

    const { error } = await stripe.confirmPayment({
      elements,
      confirmParams: {
        return_url: window.location.origin + '/dashboard/',
      },
    });

    if (error) {
      document.getElementById('payment-message').textContent = error.message;
      document.getElementById('payment-message').classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Pay Now';
    }
  });
</script>
{% endblock %}
